{% extends 'base.html' %}{% block content %}<h1>إعدادات Gmail</h1><div class="panel"><p>استخدم Gmail App Password وليس كلمة مرور الحساب العادية.</p><form method="post" class="form-grid"><label>SMTP Host<input name="SMTP_HOST" value="{{values.SMTP_HOST or 'smtp.gmail.com'}}"></label><label>Port<input name="SMTP_PORT" value="{{values.SMTP_PORT or '587'}}"></label><label>Gmail<input name="SMTP_USER" value="{{values.SMTP_USER}}"></label><label>App Password<input type="password" name="SMTP_PASSWORD" placeholder="اتركه فارغًا للاحتفاظ بالحالي"></label><label>From<input name="SMTP_FROM" value="{{values.SMTP_FROM}}"></label><label>TLS<select name="SMTP_TLS"><option value="1">مفعل</option><option value="0">غير مفعل</option></select></label><button class="btn">حفظ</button></form></div>{% endblock %}
