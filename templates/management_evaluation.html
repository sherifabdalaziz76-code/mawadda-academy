{% extends 'base.html' %}{% block content %}<h1>تقييم الإدارة</h1><form method="post" class="panel form-grid"><label>نوع التقييم<select name="target_type" id="typ"><option value="student">طالب</option><option value="teacher">معلم</option></select></label><label id="st">الطالب<select name="student_id">{% for x in students %}<option value="{{x.id}}">{{x.full_name}}</option>{% endfor %}</select></label><label id="te" style="display:none">المعلم<select name="teacher_id">{% for x in teachers %}<option value="{{x.id}}">{{x.user.full_name}}</option>{% endfor %}</select></label><label>الدرجة من 10<input type="number" name="score" min="1" max="10" step="0.1" required></label><label class="full">ملاحظة<textarea name="comment"></textarea></label><button class="btn">حفظ</button></form><script>typ.onchange=()=>{st.style.display=typ.value==='student'?'block':'none';te.style.display=typ.value==='teacher'?'block':'none'}</script>{% endblock %}
