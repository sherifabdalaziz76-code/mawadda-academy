{% extends "base.html" %}{% block content %}<div class="page-head"><h1>تقييم المعلم</h1></div><form method="post" class="form-grid panel"><label>الطالب<select name="student_id">{% for s in students %}<option value="{{s.id}}">{{s.full_name}}</option>{% endfor %}</select></label><label>المعلم<select name="teacher_id">{% for t in teachers %}<option value="{{t.id}}">{{t.user.full_name}}</option>{% endfor %}</select></label>{% for q in questions %}<label>{{q.label}}{% if q.required %} *{% endif %}<select name="q_{{q.id}}" {% if q.required %}required{% endif %}>{% for i in range(0,q.max_score+1) %}<option value="{{i}}">{{i}} / {{q.max_score}}</option>{% endfor %}</select></label>{% endfor %}<label class="full">تعليق<textarea name="comment"></textarea></label><label><input type="checkbox" name="private_to_admin"> التقييم سري للإدارة</label><button class="btn">إرسال التقييم</button></form>{% endblock %}
