{% extends 'base.html' %}{% block content %}<h1>إضافة مستخدم</h1><form method="post" enctype="multipart/form-data" class="panel form-grid"><label>الاسم<input name="full_name" required></label><label>البريد<input type="email" name="email" required></label><label>الهاتف<input name="phone"></label><label>واتساب<input name="whatsapp"></label><label>الدور<select name="role" id="role">{% for v,n in roles %}<option value="{{v}}">{{n}}</option>{% endfor %}</select></label><label>كلمة المرور<input type="password" name="password" minlength="8" required></label><label>الصورة<input type="file" name="photo" accept="image/*"></label><label>التخصص للمعلم<input name="specialization"></label><label>الدولة لولي الأمر<input name="country" value="مصر"></label><label style="grid-column:1/-1">العنوان / النبذة<textarea name="address"></textarea><textarea name="bio" placeholder="نبذة المعلم"></textarea></label><button class="btn">إنشاء المستخدم</button></form>{% endblock %}
