{% extends "base.html" %}{% block content %}<div class="page-head"><div><h1>إدارة الصلاحيات</h1><p>تعديل صلاحيات الدور بالكامل أو تخصيص مستخدم بعينه.</p></div></div><div class="panel"><form method="get" class="form-grid"><label>نوع التعديل<select name="scope" onchange="this.form.submit()"><option value="role" {% if scope=='role' %}selected{% endif %}>حسب الدور</option><option value="user" {% if scope=='user' %}selected{% endif %}>مستخدم محدد</option></select></label>{% if scope=='role' %}<label>الدور<select name="role" onchange="this.form.submit()"><option value="teacher" {% if role=='teacher' %}selected{% endif %}>معلم</option><option value="parent" {% if role=='parent' %}selected{% endif %}>ولي أمر</option></select></label>{% else %}<label>المستخدم<select name="user_id" onchange="this.form.submit()"><option value="">اختر</option>{% for u in users %}<option value="{{u.id}}" {% if user_id==u.id %}selected{% endif %}>{{u.full_name}} — {{u.role}}</option>{% endfor %}</select></label>{% endif %}</form>{% if scope=='role' or user_id %}<form method="post"><input type="hidden" name="scope" value="{{scope}}"><input type="hidden" name="role" value="{{role}}"><input type="hidden" name="user_id" value="{{user_id or ''}}">{% for p in items %}<label style="display:block;margin:10px"><input type="checkbox" name="permission_ids" value="{{p.id}}" {% if p.id in selected %}checked{% endif %}> {{p.name}} <small>{{p.code}}</small></label>{% endfor %}<button class="btn">حفظ وتطبيق</button></form>{% endif %}</div>{% endblock %}
