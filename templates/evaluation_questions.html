{% extends 'base.html' %}{% block content %}<div class="page-head"><div><h1>أسئلة التقييم</h1><p>إضافة، تعطيل، ترتيب وتغيير الدرجة القصوى دون تعديل الكود.</p></div></div><div class="panel"><form method="get"><label>نوع التقييم<select name="type" onchange="this.form.submit()"><option value="student" {% if etype=='student' %}selected{% endif %}>المعلم يقيّم الطالب</option><option value="teacher" {% if etype=='teacher' %}selected{% endif %}>ولي الأمر يقيّم المعلم</option></select></label></form></div><div class="panel"><form method="post"><input type="hidden" name="type" value="{{etype}}"><input type="hidden" name="action" value="save"><table><tr><th>السؤال</th><th>الحد الأقصى</th><th>الترتيب</th><th>إجباري</th><th>الحالة</th></tr>{% for q in items %}<tr><td><input name="label_{{q.id}}" value="{{q.label}}"></td><td><input type="number" min="2" max="10" name="max_{{q.id}}" value="{{q.max_score}}"></td><td><input type="number" name="order_{{q.id}}" value="{{q.sort_order}}"></td><td><input type="checkbox" name="required_{{q.id}}" {% if q.required %}checked{% endif %}></td><td>{{'مفعل' if q.active else 'معطل'}}</td></tr>{% endfor %}</table><button class="btn">حفظ التعديلات</button></form></div><div class="panel"><h2>إضافة سؤال</h2><form method="post" class="form-grid"><input type="hidden" name="type" value="{{etype}}"><input type="hidden" name="action" value="add"><label>السؤال<input name="label" required></label><label>كود داخلي اختياري<input name="code"></label><label>الدرجة القصوى<input type="number" name="max_score" value="5" min="2" max="10"></label><button class="btn">إضافة</button></form></div><div class="panel"><h2>تفعيل/تعطيل</h2>{% for q in items %}<form method="post" style="display:inline-block;margin:5px"><input type="hidden" name="type" value="{{etype}}"><input type="hidden" name="question_id" value="{{q.id}}"><input type="hidden" name="action" value="{{'delete' if q.active else 'restore'}}"><button class="btn small">{{'تعطيل' if q.active else 'إعادة تفعيل'}} — {{q.label}}</button></form>{% endfor %}</div>{% endblock %}
