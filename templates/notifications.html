
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>الإشعارات</h1></div>
<div class="notification-list">{% for n in notifications %}<div class="notification-card {% if not n.read_at %}unread{% endif %}"><div><h3>{{n.title}}</h3><p>{{n.body}}</p><small>{{n.created_at}}</small></div><form method="post" action="{{url_for('notification_read',notification_id=n.id)}}"><button class="btn small">{% if n.read_at %}فتح{% else %}قراءة{% endif %}</button></form></div>{% else %}<div class="panel">لا توجد إشعارات.</div>{% endfor %}</div>{% endblock %}
