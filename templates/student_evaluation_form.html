{% extends "base.html" %}{% block content %}<div class="page-head"><div><h1>تقييم {{student.full_name}}</h1><p>{{session.circle.name}} — {{session.session_date}}</p></div></div><form method="post" class="form-grid panel">{% for q in questions %}<label>{{q.label}}{% if q.required %} *{% endif %}<select name="q_{{q.id}}" {% if q.required %}required{% endif %}>{% for i in range(0,q.max_score+1) %}<option value="{{i}}" {% if answers.get(q.id,0)==i %}selected{% endif %}>{{i}} / {{q.max_score}}</option>{% endfor %}</select></label>{% else %}<p>لا توجد أسئلة تقييم مفعلة. راجع الإعدادات.</p>{% endfor %}<label><input type="checkbox" name="homework_done" {% if evaluation and evaluation.homework_done %}checked{% endif %}> الواجب السابق تم</label><label class="full">ما تم شرحه/تسميعه<input name="lesson_covered" value="{{evaluation.lesson_covered if evaluation else ''}}"></label><label class="full">الواجب القادم<input name="homework" value="{{evaluation.homework if evaluation else ''}}"></label><label class="full">ملاحظة لولي الأمر<textarea name="parent_note">{{evaluation.parent_note if evaluation else ''}}</textarea></label><button class="btn">حفظ التقييم</button></form>{% endblock %}
