
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>تسجيل حركة مالية</h1></div>
<form method="post" class="form-grid panel"><label>النوع<select name="direction"><option value="in">إيراد</option><option value="out">مصروف</option></select></label><label>التاريخ<input type="date" name="tx_date" required></label><label>الخزنة<select name="cashbox_id">{% for b in cashboxes %}<option value="{{b.id}}">{{b.name}} - {{b.currency}}</option>{% endfor %}</select></label><label>التصنيف<select name="category_id"><option value="">بدون تصنيف</option>{% for c in categories %}<option value="{{c.id}}">{{c.name}} - {{c.kind}}</option>{% endfor %}</select></label><label>المبلغ<input type="number" step="0.01" name="amount" min="0.01" required></label><label>العملة<select name="currency"><option>EGP</option><option>USD</option><option>SAR</option><option>AED</option><option>KWD</option><option>QAR</option><option>EUR</option><option>GBP</option></select></label><label>رقم مرجعي<input name="reference_no"></label><label class="full">الوصف<textarea name="description"></textarea></label><button class="btn">حفظ الحركة</button></form>{% endblock %}
