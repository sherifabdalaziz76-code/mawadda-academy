
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>إنشاء حلقة</h1></div>
<form method="post" class="form-grid panel"><label>اسم الحلقة<input name="name" required></label><label>المعلم<select name="teacher_id">{% for t in teachers %}<option value="{{t.id}}">{{t.user.full_name}}</option>{% endfor %}</select></label><label>نوع الدراسة<select name="study_type"><option>أونلاين</option><option>حضوري</option><option>هجين</option></select></label><label>مدة الحصة بالدقائق<input type="number" name="default_minutes" value="30" min="10"></label><label class="full">الجدول<input name="schedule_text" placeholder="مثال: الأحد والثلاثاء 7 مساءً"></label><button class="btn">حفظ</button></form>{% endblock %}
