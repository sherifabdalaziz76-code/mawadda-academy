{% extends "base.html" %}{% block content %}<div class="page-head"><div><h1>البحث الشامل</h1><p>طالب، معلم، عقد أو شكوى</p></div></div><div class="panel"><form method="get"><input name="q" value="{{q}}" placeholder="اكتب الاسم أو الكود" autofocus><button>بحث</button></form></div><div class="panel"><table><tr><th>النوع</th><th>الكود</th><th>الاسم</th></tr>{% for kind,code,name,link in results %}<tr><td>{{kind}}</td><td><a href="{{link}}">{{code}}</a></td><td>{{name}}</td></tr>{% else %}<tr><td colspan="3">لا توجد نتائج.</td></tr>{% endfor %}</table></div>{% endblock %}
