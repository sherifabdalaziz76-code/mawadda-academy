
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>إنشاء كشف معلم</h1></div>
<form method="post" class="form-grid panel"><label>المعلم<select name="teacher_id">{% for t in teachers %}<option value="{{t.id}}">{{t.user.full_name}}</option>{% endfor %}</select></label><label>العملة<select name="currency"><option>EGP</option><option>USD</option><option>SAR</option><option>AED</option></select></label><label>من<input type="date" name="period_from" required></label><label>إلى<input type="date" name="period_to" required></label><label>مكافآت<input type="number" step="0.01" name="bonuses" value="0"></label><label>خصومات<input type="number" step="0.01" name="deductions" value="0"></label><label>الخزنة<select name="cashbox_id"><option value="">تحديد لاحقًا</option>{% for b in cashboxes %}<option value="{{b.id}}">{{b.name}} - {{b.currency}}</option>{% endfor %}</select></label><label class="full">ملاحظات<textarea name="notes"></textarea></label><button class="btn">إنشاء الكشف</button></form>{% endblock %}
