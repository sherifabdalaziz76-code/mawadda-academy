
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>الخزائن</h1><a class="btn" href="{{url_for('cashbox_new')}}">+ خزنة جديدة</a></div>
<div class="panel"><table><tr><th>الاسم</th><th>العملة</th><th>الرصيد الافتتاحي</th><th>الرصيد الحالي</th><th>الحالة</th></tr>
{% for b in cashboxes %}<tr><td>{{b.name}}</td><td>{{b.currency}}</td><td>{{b.opening_balance}}</td><td>{{b.current_balance}}</td><td>{% if b.active %}نشطة{% else %}موقوفة{% endif %}</td></tr>{% endfor %}</table></div>{% endblock %}
