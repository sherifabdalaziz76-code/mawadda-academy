{% extends "base.html" %}{% block content %}<div class="page-head"><div><h1>مستندات {{student.full_name}}</h1><p>بطاقة، شهادة ميلاد، عقد، إيصال</p></div></div><div class="panel"><form method="post" enctype="multipart/form-data"><div class="form-grid"><label>نوع المستند<select name="document_type"><option>شهادة ميلاد</option><option>بطاقة ولي الأمر</option><option>جواز سفر</option><option>عقد</option><option>إيصال</option><option>أخرى</option></select></label><label>الملف<input type="file" name="file" required></label><label class="full">ملاحظات<textarea name="notes"></textarea></label></div><button>رفع المستند</button></form></div><div class="panel"><table><tr><th>النوع</th><th>الاسم</th><th>التاريخ</th><th></th></tr>{% for d in student.documents %}<tr><td>{{d.document_type}}</td><td>{{d.original_name}}</td><td>{{d.uploaded_at}}</td><td><a href="{{url_for('uploaded_file',filename=d.stored_name)}}">تنزيل</a></td></tr>{% else %}<tr><td colspan="4">لا توجد مستندات.</td></tr>{% endfor %}</table></div>{% endblock %}
