
{% extends "base.html" %}{% block content %}<div class="page-head"><h1>إنشاء حصة</h1></div>
<form method="post" class="form-grid panel"><label>الحلقة<select name="circle_id">{% for c in circles %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></label><label>التاريخ<input type="date" name="session_date"></label><label>الوقت<input type="time" name="start_time"></label><label>المدة بالدقائق<input type="number" name="duration_minutes" value="30"></label><label>الحالة<select name="status"><option>مجدولة</option><option>تمت</option><option>ملغاة</option></select></label><label class="full">الموضوع<input name="topic"></label><label class="full">ملاحظات<textarea name="notes"></textarea></label><button class="btn">حفظ</button></form>{% endblock %}
